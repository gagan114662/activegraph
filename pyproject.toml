[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "activegraph"
version = "0.0.1"
description = "An event-sourced reactive graph runtime for long-running, auditable, agentic systems."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Active Graph contributors" }]
keywords = ["graph", "agents", "event-sourcing", "runtime"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 3 - Alpha",
]
dependencies = []

[project.optional-dependencies]
llm = []        # placeholder: v0.6
sqlite = []     # placeholder: v0.5
all = []
dev = ["pytest>=7"]

[project.urls]
Homepage = "https://github.com/yoheinakajima/activegraph"

[tool.setuptools.packages.find]
include = ["activegraph*"]
exclude = ["tests*", "examples*"]
