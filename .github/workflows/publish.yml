# Build the sdist + wheel and publish to PyPI on tag push.
# CONTRACT v1.0 #C8 (PyPI publishing is externally owned — this
# workflow is the agent-shipped artifact; the maintainer pushes
# the tag).
#
# Triggers:
#   - push of a tag matching `v*` (e.g. v1.0-rc2, v1.0, v1.0.1).
#     Future tags publish automatically without workflow edits.
#   - manual dispatch (for re-runs or verification builds without
#     publish — the maintainer can run the build job in isolation
#     to confirm artifacts look right before tagging).
#
# Publish path: PyPI trusted publishing (OIDC-based). No
# long-lived API tokens stored in repo secrets. Setup required on
# PyPI side once per repository per environment; see
# docs/about/publishing.md for the prerequisites and verification
# steps.

name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  # id-token write enables PyPI trusted publishing (OIDC).
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    # Only publish on tag push, not on manual dispatch. Manual
    # dispatch builds artifacts so the maintainer can inspect them;
    # publishing without a tag would corrupt the version-tag
    # correspondence the future v1.1 #6 gate enforces.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/activegraph
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
