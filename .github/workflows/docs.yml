# Build and deploy the documentation site to GitHub Pages.
# CONTRACT v1.0 #5, #C6, #4d.
#
# Triggers:
#   - push to main (deploys)
#   - pull_request (builds only — verifies the site builds cleanly
#     for a PR before merge)
#   - manual dispatch
#
# The custom domain docs.activegraph.ai is locked via docs/CNAME
# (CONTRACT v1.0 #C6, v1.0-rc3 amendment — primary domain switched
# from .dev to .ai). Until Pages is enabled on the repo AND DNS
# resolves, the site is unreachable; the v1.1 #9 deploy-verification
# gate is the failure signal until that lands.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs on new pushes to the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mkdocs
        # Pulls mkdocs + mkdocs-material + mkdocstrings[python] +
        # mkdocs-llmstxt (v1.0.5 #1) from the `docs` extra in
        # pyproject.toml. Keeping the dep list in pyproject (not
        # hardcoded here) means adding a new mkdocs plugin updates
        # one place, not two — the same pattern every other workflow
        # already follows. The pre-rc3-amendment shape
        # ("pip install mkdocs mkdocs-material") drifted from
        # mkdocs.yml's `plugins:` block since the doc-site phase and
        # was the silent failure v1.1 #9 caught on its first run.
        run: pip install -e ".[docs]" pytest
      - name: Build site
        run: mkdocs build
      - name: Verify llms.txt generation (CONTRACT v1.0.5 #1)
        # The gate asserts site/llms.txt and site/llms-full.txt
        # exist after the build, carry the expected H1 + blockquote
        # summary + nav-anchor coverage. Runs against the build
        # output produced one step above; reuses that artifact via
        # a fresh `mkdocs build` into a temp dir so the test stays
        # self-contained (Standing Rule §2 — anchors on the
        # contract claim, not on the path that produced site/).
        run: pytest -m slow tests/test_llms_txt.py -v
      - name: Upload pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
