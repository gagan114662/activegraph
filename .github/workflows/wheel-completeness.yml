# Wheel-completeness CI gate. CONTRACT v1.1 #8.
#
# Builds the wheel, installs it into a fresh venv (NOT editable),
# and runs `activegraph quickstart` against the installed package.
# If any runtime data file is missing from the wheel, the
# quickstart crashes with `PackPromptLoadError` (the v1.0-rc2 B3
# failure shape) or analog, and the gate fails.
#
# This catches the class of bug that's structurally invisible to
# every other CI gate: source-tree tests and editable installs see
# the prompts directory by definition; only a clean-venv install
# from the built wheel exposes a missing package-data declaration.
#
# This workflow is configured as a required status check on the
# main branch (CONTRACT v1.1 #8 implementation scope). The slow
# marker is passed explicitly so the test runs in CI; locally it's
# opt-in via `pytest -m slow`.

name: wheel-completeness

on:
  push:
    branches: [main]
    paths:
      - "activegraph/**"
      - "pyproject.toml"
      - "tests/test_wheel_completeness.py"
      - "tests/test_cli_flag_drift.py"
      - "scripts/gate_cli_flag_drift.py"
      - "cli_flag_drift_allowlist.toml"
      - ".github/workflows/wheel-completeness.yml"
      - "docs/**"
      - "CHANGELOG.md"
      - "CONTRACT.md"
      - "README.md"
      - "HANDOFF.md"
      - "CONTRIBUTING.md"
  pull_request:
    # No paths: filter. The gate is a required status check on
    # main; a paths-filtered pull_request trigger silently skips
    # the job on PRs that don't touch the filtered paths (docs-
    # only PRs, workflow-file-only PRs, etc.), and a missing
    # check is not a passing check — the merge is blocked with
    # no recourse short of pushing a no-op code change. Running
    # the gate on every PR is slightly redundant on docs-only
    # PRs (the wheel hasn't changed; the gate passes trivially)
    # but it produces a green check that the branch protection
    # rule can match against, which is what the rule requires.
    # Push trigger keeps its paths filter — only the PR-side gate
    # needs to run unconditionally.
  workflow_dispatch:

jobs:
  wheel-completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build + pytest + activegraph (for conftest)
        # The outer env needs activegraph importable because
        # tests/conftest.py imports from it on pytest collection.
        # The gate's inner venv (created inside the test) is fully
        # isolated — that's where the wheel-completeness check
        # actually happens. The outer install can use editable
        # mode; it has zero effect on the gate's verdict.
        run: |
          pip install build pytest
          pip install -e .
      - name: Run wheel-completeness gate
        run: pytest -m slow tests/test_wheel_completeness.py -v

      # CLI flag drift gate — CONTRACT v1.1 #2, frame t2-build-cli-flag-drift-gate.
      # Wired into this workflow per GAUNTLET T2 acceptance: "the same workflow
      # file the wheel-completeness gate uses." Two surfaces: the pytest suite
      # exercises extraction + allowlist semantics + synthetic fixtures; the
      # gate script runs end-to-end against the live corpus.
      - name: Run CLI flag drift gate test suite
        run: pytest tests/test_cli_flag_drift.py -v

      - name: Run CLI flag drift gate script (end-to-end)
        run: python scripts/gate_cli_flag_drift.py
