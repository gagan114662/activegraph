  - design_decision_D1_amended_with_pick_and_justification
  - design_decision_D2_amended_with_pick_and_justification
  - design_decision_D3_amended_with_pick_and_justification
  - design_decision_D4_amended_with_pick_and_justification

  # Implementation predicates
