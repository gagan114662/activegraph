id: t3-implement-cli-set-flag

goal: >
  Implement `activegraph fork --set <key>=<value>` end-to-end (parse, persist,
  replay) per CONTRACT v1.1 #1, with the four design decisions (D-1..D-4)
  amended into this frame before any code lands.

# Goal context (informational; the testable assertion is the one-sentence `goal`
# above plus the predicates below):
# - Flag is referenced in 8 markdown files (CHANGELOG.md, CONTRACT.md,
#   docs/quickstart.md, docs/cookbook/migration-from-v0-7.md,
#   docs/cookbook/common-patterns.md, docs/guides/operating-in-production.md,
#   docs/concepts/forking.md, docs/reference/cli.md) with zero Python
#   implementation today — this frame closes that gap.

constraints:
  - "CONTRACT v1.0: tests must remain deterministic, no live network"
  - "CONTRACT v1.1 #1: spec'd in docs but unimplemented — close the gap"
  - "CONTRACT v1.1 #2 (anticipated): spec-vs-impl drift gate must catch
    recurrence; this frame produces the first artifact that gate would check"
  - "Discipline pattern: audit-then-baseline-then-narrow"
  - "Discipline pattern: boundary-anchored tests (per §7 #2 of CONTRACT-review-findings.md)"
  - "Allowlist invariant: the 23 currently-clean mypy --strict modules must remain clean"
  - "Ring 0 docstring coverage stays at 100%; Ring 1 stays >= 80%"
  - "Backward compatibility: existing fork records without --set overrides
    must replay unchanged"
  - "No skipif decorators to mask test ordering; root-cause fixes only"

# Design decisions — Spec Owner must answer all four in amendments before
# Code Owner starts. Goal Reaper will refuse to evaluate this frame until
# all four amendments are committed.
design_decisions_required:
  - id: D-1
    question: >
      Replay semantics — when a fork created with `--set diligence.threshold=0.7`
      is replayed at a later session, does replay use the new value (0.7) or
      the value that was active when the fork was originally created? Spec
      both behaviors and pick one with a one-paragraph justification.
    classification: "behavioral — locks user-visible semantics"

  - id: D-2
    question: >
      Bad-value handling — if `--set diligence.threshold=not_a_number` is
      passed, when does the failure surface? Options: (a) fail-fast at CLI
      parse time before fork creation; (b) fail at fork construction when
      the override would be applied to the pack default; (c) store as-is
      and explode at replay when the consuming code type-coerces. Pick
      one and name the contract claim (e.g., "validation fires at
      registration time" pattern from v1.0.2.post1).
    classification: "boundary-mismatch class — see CONTRACT v1.0.2.post1 lesson"

  - id: D-3
    question: >
      Persistence schema — fork records currently have no override slot.
      Adding `--set` requires either (a) a new column on the fork record
      table, (b) a JSON blob on an existing column, (c) a sidecar table.
      Pick one, name the migration path for existing fork records, and
      confirm `replay_in_fresh_venv_passes` continues to hold on a database
      created before this change.
    classification: "schema migration — backward compatibility critical"

  - id: D-4
    question: >
      Type coercion — `--set foo=bar` passes a string. The pack key
      `diligence.threshold` is a float in code. Options: (a) strings only,
      consuming code must coerce; (b) infer int/float/bool from the value
      text; (c) require an explicit typed form like `--set foo:float=0.7`.
      Pick one and name the failure mode for each rejected alternative.
    classification: "ergonomics — affects every downstream pack consumer"

